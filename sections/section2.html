<!-- SECTION 2 — Countdown -->
<div class="card anim-card">
    <div class="floral top"></div>
    <div class="card-bg"></div>
    <div class="card-border"></div>

    <div class="section-inner">
        <h2 class="anim-fade-in-up" style="margin-bottom: 24px;">Menghitung Waktu</h2>
        
        <div class="countdown-container anim-scale-in">
            <div class="countdown-item anim-fade stagger-1">
                <div class="countdown-number" id="d">00</div>
                <div class="countdown-label">Hari</div>
            </div>
            <div class="countdown-item anim-fade stagger-2">
                <div class="countdown-number" id="h">00</div>
                <div class="countdown-label">Jam</div>
            </div>
            <div class="countdown-item anim-fade stagger-3">
                <div class="countdown-number" id="m">00</div>
                <div class="countdown-label">Menit</div>
            </div>
            <div class="countdown-item anim-fade stagger-4">
                <div class="countdown-number" id="s">00</div>
                <div class="countdown-label">Detik</div>
            </div>
        </div>

        <div class="info-box anim-slide-in-up" style="margin-top: 20px;">
            <p class="info-text">Acara akan segera dimulai</p>
            <p class="info-highlight" style="font-family: 'Crimson Text', serif; font-size: 28px; color: var(--secondary);">Tunggu Kami!</p>
        </div>
    </div>

    <div class="floral bottom"></div>
</div>
