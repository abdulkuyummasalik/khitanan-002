<!-- =============================================
     COVER — Halaman pembuka sebelum undangan dibuka
============================================= -->
<div id="cover-overlay">

    <!-- background luar (gradient dengan overlay) -->
    <div id="cover-outer-bg"></div>

    <!-- card tengah -->
    <div id="cover-card">

        <!-- ornamen floral top dan bottom -->
        <div class="cv-floral-top"></div>
        <div class="cv-floral-bottom"></div>

        <!-- konten -->
        <div id="cover-content">
            <p id="cv-event-label"></p>
            <p id="cv-name-cursive"></p>

            <!-- foto bulat dengan frame -->
            <div class="cv-photo-wrap">
                <div class="cv-photo-frame">
                    <img src="https://placehold.co/120x120/1b5e20/ffffff?text=Foto" alt="Foto Anak" class="cv-photo-img">
                </div>
            </div>

            <p id="cv-kepada">Kepada Yth.</p>
            <p id="cv-tamu">Tamu Undangan</p>

            <button id="cv-btn-buka" onclick="bukaUndangan()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
                    <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
                </svg>
                Buka Undangan
            </button>
        </div>

    </div>
</div>
