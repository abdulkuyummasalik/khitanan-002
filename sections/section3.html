<!-- SECTION 3 — Detail Acara & Lokasi -->
<div class="card anim-card">
    <div class="floral top"></div>
    <div class="card-bg"></div>
    <div class="card-border"></div>

    <div class="section-inner">
        <h2 class="anim-fade-in-up" style="margin-bottom: 32px;">Detail Acara</h2>

        <!-- Event Items Grid -->
        <div class="event-grid anim-fade">
            <!-- Waktu -->
            <div class="event-item">
                <div class="event-icon-box">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"></circle>
                        <polyline points="12 6 12 12 16 14"></polyline>
                    </svg>
                </div>
                <p class="event-label">Waktu Pelaksanaan</p>
                <p class="event-text" id="event-date">Sabtu, 24 Juni 2026</p>
                <p class="event-text main-line">Jam 08:00 - 14:00 WIB</p>
            </div>

            <!-- Tempat -->
            <div class="event-item">
                <div class="event-icon-box">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                        <circle cx="12" cy="10" r="3"></circle>
                    </svg>
                </div>
                <p class="event-label">Lokasi</p>
                <p class="event-text" style="font-weight: 600; color: var(--primary);" id="location-name">Gedung Serba Guna At-Taqwa</p>
                <p class="event-text addr-line">Jl. Menteng Raya No. 45, Jakarta Pusat</p>
            </div>

            <!-- Catatan -->
            <div class="event-item">
                <div class="event-icon-box">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"></circle>
                        <line x1="12" y1="16" x2="12" y2="12"></line>
                        <line x1="12" y1="8" x2="12.01" y2="8"></line>
                    </svg>
                </div>
                <p class="event-label">Catatan Penting</p>
                <p class="event-text note-line" style="font-size: 13px;">Kami sangat berbahagia mengundang Anda untuk turut serta dalam perayaan Walimatul Khitan putra kami.</p>
            </div>
        </div>

        <!-- Maps Section -->
        <div class="map-embed anim-slide-in-up" style="margin-top: 32px;">
            <iframe 
                src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3966.5212603229453!2d106.81275381177979!3d-6.1914202619999995!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x2e69f3e945e34b9d%3A0x5b206a0555666d5c!2sJl.%20Menteng%20Raya%20No.%2045%2C%20Jakarta%20Pusat!5e0!3m2!1sid!2sid!4v1234567890"
                width="100%"
                height="280"
                style="border: none; border-radius: 12px; box-shadow: 0 4px 12px rgba(27, 94, 32, 0.12);"
                allowfullscreen=""
                loading="lazy"
                referrerpolicy="no-referrer-when-downgrade">
            </iframe>
        </div>

        <!-- Action Buttons -->
        <div class="event-actions anim-fade-in-up" style="margin-top: 24px; display: flex; gap: 12px; flex-wrap: wrap; justify-content: center;">
            <button class="calendar-btn" onclick="addToCalendar()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right: 8px; display: inline;">
                    <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                    <line x1="16" y1="2" x2="16" y2="6"></line>
                    <line x1="8" y1="2" x2="8" y2="6"></line>
                    <line x1="3" y1="10" x2="21" y2="10"></line>
                </svg>
                Tambah ke Kalender
            </button>
            <button class="maps-btn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right: 8px; display: inline;">
                    <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                    <circle cx="12" cy="10" r="3"></circle>
                </svg>
                Buka Maps
            </button>
        </div>
    </div>

    <div class="floral bottom"></div>
</div>
