<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Walimatul Khitan - Modern Design</title>

    <!-- Google Fonts - Modern & Fresh -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700;800&family=Lora:wght@400;500;600&display=swap"
          rel="stylesheet">

    <!-- Base & shared styles -->
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/typography.css">

    <!-- Animations -->
    <link rel="stylesheet" href="css/animations.css">

    <!-- UI Controls (bottom nav, floating sidebar) -->
    <link rel="stylesheet" href="css/ui-controls.css">

    <!-- Cover / splash screen -->
    <link rel="stylesheet" href="css/cover.css">

    <!-- Per-section styles -->
    <link rel="stylesheet" href="css/section1.css">
    <link rel="stylesheet" href="css/section2.css">
    <link rel="stylesheet" href="css/section3.css">
    <link rel="stylesheet" href="css/section4.css">
    <link rel="stylesheet" href="css/section5.css">
    <link rel="stylesheet" href="css/section6.css">
    <link rel="stylesheet" href="css/section7.css">
    <link rel="stylesheet" href="css/section8.css">
</head>

<body class="cover-active">

    <!-- Scroll progress bar -->
    <div id="scroll-progress">
        <div id="scroll-progress-bar"></div>
    </div>

    <!-- Bottom Navigation Bar — 5 tab -->
    <nav id="bottom-nav" role="navigation" aria-label="Navigasi section">
        <ul class="bnav-list">
            <li class="bnav-item">
                <button class="bnav-btn active" data-section="section-1" onclick="navTo('section-1',this)" aria-label="Sampul">
                    <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
                        <polyline points="9 22 9 12 15 12 15 22"/>
                    </svg>
                    <span class="bnav-label">Sampul</span>
                </button>
            </li>
            <li class="bnav-item">
                <button class="bnav-btn" data-section="section-3" onclick="navTo('section-3',this)" aria-label="Acara">
                    <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="4" width="18" height="18" rx="2"/>
                        <line x1="16" y1="2" x2="16" y2="6"/>
                        <line x1="8"  y1="2" x2="8"  y2="6"/>
                        <line x1="3"  y1="10" x2="21" y2="10"/>
                    </svg>
                    <span class="bnav-label">Acara</span>
                </button>
            </li>
            <li class="bnav-item">
                <button class="bnav-btn" data-section="section-4" onclick="navTo('section-4',this)" aria-label="Galeri">
                    <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="18" height="18" rx="2"/>
                        <circle cx="8.5" cy="8.5" r="1.5"/>
                        <polyline points="21 15 16 10 5 21"/>
                    </svg>
                    <span class="bnav-label">Galeri</span>
                </button>
            </li>
            <li class="bnav-item">
                <button class="bnav-btn" data-section="section-5" onclick="navTo('section-5',this)" aria-label="Ucapan">
                    <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
                    </svg>
                    <span class="bnav-label">Ucapan</span>
                </button>
            </li>
            <li class="bnav-item">
                <button class="bnav-btn" data-section="section-6" onclick="navTo('section-6',this)" aria-label="Hadiah">
                    <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="20 12 20 22 4 22 4 12"/>
                        <rect x="2" y="7" width="20" height="5"/>
                        <line x1="12" y1="22" x2="12" y2="7"/>
                        <path d="M12 7H7.5a2.5 2.5 0 010-5C11 2 12 7 12 7z"/>
                        <path d="M12 7h4.5a2.5 2.5 0 000-5C13 2 12 7 12 7z"/>
                    </svg>
                    <span class="bnav-label">Hadiah</span>
                </button>
            </li>
        </ul>
    </nav>

    <!-- Floating Right — 3 tombol -->
    <div id="floating-sidebar" role="complementary" aria-label="Kontrol tambahan">
        <button class="fsb-btn" id="btn-scroll-top" onclick="smoothScrollTop()" data-tip="Ke atas" aria-label="Scroll ke atas">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="18 15 12 9 6 15"/>
            </svg>
        </button>
        <button class="fsb-btn" id="btn-music" onclick="toggleMusic()" data-tip="Putar musik" aria-label="Putar / pause musik">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M9 18V5l12-2v13"/>
                <circle cx="6" cy="18" r="3"/>
                <circle cx="18" cy="16" r="3"/>
            </svg>
        </button>
        <button class="fsb-btn" id="btn-autoscroll" onclick="toggleAutoScroll()" data-tip="Auto scroll" aria-label="Auto scroll">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="12" y1="5" x2="12" y2="19"/>
                <polyline points="19 12 12 19 5 12"/>
            </svg>
        </button>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <!-- Audio -->
    <audio id="bg-music" loop preload="none">
        <source src="assets/music.mp3" type="audio/mpeg">
    </audio>

    <!-- sections di-inject oleh loader.js ke dalam #app -->
    <script src="js/data.js"></script>
    <script src="js/loader.js"></script>
    <script src="js/animations.js"></script>
    <script src="js/ui-controls.js"></script>
    <script src="js/main.js"></script>
    <script src="js/data-renderer.js"></script>
    
    <!-- Firebase CDN (Compat) -->
    <script src="js/firebase-config.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore-compat.js"></script>
    
    <!-- RSVP Integration -->
    <script src="js/rsvp.js"></script>

</body>

</html>
